<!DOCTYPE html>
<html lang="en" class="h-full bg-slate-50">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ page_title }} | {{ app_name }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            ink: '#0f172a',
            brand: '#0f766e',
            mist: '#eef6f5',
          },
          boxShadow: {
            panel: '0 20px 45px -24px rgba(15, 23, 42, 0.22)',
          },
          fontFamily: {
            display: ['Space Grotesk', 'sans-serif'],
            body: ['IBM Plex Sans', 'sans-serif'],
          },
        }
      }
    };
  </script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <link rel="stylesheet" href="{{ request.url_for('static', path='css/app.css') }}" />
</head>
<body class="min-h-full font-body text-slate-900">
  <div class="min-h-screen lg:flex">
    {% include "partials/sidebar.html" %}
    <div class="min-w-0 flex-1">
      <header class="sticky top-0 z-20 border-b border-slate-200/80 bg-white/90 backdrop-blur">
        <div class="mx-auto flex max-w-7xl flex-col gap-4 px-6 py-4 lg:px-8 xl:flex-row xl:items-center xl:justify-between">
          <div class="min-w-0">
            <p class="text-xs font-semibold uppercase tracking-[0.24em] text-slate-400">{{ active_nav|replace("_", " ") }}</p>
            <h1 class="truncate font-display text-2xl text-ink">{{ page_title }}</h1>
          </div>
          <div class="flex flex-col gap-3 sm:flex-row sm:items-center">
            <label class="relative block sm:w-80">
              <span class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-4 text-slate-400">⌕</span>
              <input type="text" placeholder="Search audits, domains, issues"
                     class="w-full rounded-2xl border border-slate-200 bg-slate-50 py-2.5 pl-10 pr-4 text-sm text-slate-700 placeholder:text-slate-400 focus:border-brand focus:outline-none focus:ring-2 focus:ring-brand/20" />
            </label>
            <div class="flex items-center gap-3">
              <div class="flex h-11 w-11 items-center justify-center rounded-2xl border border-slate-200 bg-white text-slate-500">⎋</div>
              <div class="rounded-2xl border border-slate-200 bg-white px-4 py-2.5">
                <p class="text-xs font-semibold uppercase tracking-[0.18em] text-slate-400">Workspace</p>
                <p class="text-sm font-medium text-slate-900">Local Admin</p>
              </div>
            </div>
            <a href="/audits/new" class="inline-flex items-center rounded-xl bg-brand px-4 py-2 text-sm font-semibold text-white shadow-panel transition hover:bg-teal-700">New Audit</a>
          </div>
        </div>
      </header>
      <main class="mx-auto max-w-7xl px-6 py-8 lg:px-8">
        {% block content %}{% endblock %}
      </main>
    </div>
  </div>
</body>
</html>
